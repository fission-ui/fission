<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fission Web Smoke</title>
    <link rel="icon" type="image/png" href="../../../docs/fission_logo.png" />
    <style>
      :root {
        color-scheme: dark;
        background: #14171f;
      }
      html, body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(circle at top, #243043 0%, #14171f 55%);
        color: #f6fbff;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }
      body {
        display: grid;
        grid-template-rows: auto 1fr;
      }
      header {
        padding: 16px 20px 0;
      }
      h1 {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #9acdbd;
      }
      p {
        margin: 6px 0 0;
        color: #b8c2d1;
        font-size: 14px;
      }
      canvas {
        display: block;
        width: 100vw;
        height: calc(100vh - 64px);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Fission Web Smoke</h1>
      <p>WASM shell smoke test using the shared runtime and the default Fission icon.</p>
    </header>
    <script type="module" src="./bootstrap.mjs"></script>
  </body>
</html>
