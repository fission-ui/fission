<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FieldInspector</title>
    <link rel="icon" type="image/png" href="../../assets/app-icon.png" />
    <style>
      :root {
        color-scheme: dark;
        background: #14171f;
      }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #14171f;
      }
      body, #fission-web-mount {
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        border: 0;
        outline: none;
        user-select: none;
        -webkit-user-drag: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }
      canvas:focus, canvas:focus-visible {
        outline: none;
      }
    </style>
  </head>
  <body>
    <main id="fission-web-mount" aria-label="FieldInspector"></main>
    <script type="module" src="./bootstrap.mjs"></script>
  </body>
</html>
