targets = ["site"]

[app]
name = "fission-documentation"
app_id = "io.github.worka-ai.fission"

[site]
entry = "crate::site_app"
base_url = "https://fission.rs"
base_path = "/"
canonical_url = "https://fission.rs"
out_dir = "dist/site"
default_locale = "en-GB"
locales = ["en-GB"]
pretty_urls = true
generate_sitemap = true
generate_robots = true
title = "Fission"
description = "Build, test, package, and release production Rust apps across desktop, mobile, web, terminal, static site, and server-rendered site targets."
logo = "/img/fission-mark.svg"
favicon = "/img/fission-mark.svg"
asset_dirs = ["static"]

[site.code_highlighting]
enabled = true

[site.search]
enabled = true

[[site.elements]]
placement = "head-end"
file = "site/google-analytics.html"

[distribution.github_pages.production]
owner = "worka-ai"
repo = "fission"
mode = "actions"
source = "github-actions"
site_kind = "project"
base_path = "/"
custom_domain = "fission.rs"
enforce_https = true
workflow = "publish-website.yml"
production_branch = "main"

[[site.nav]]
title = "Product"
href = "/product/overview/"

[[site.nav.children]]
title = "Platform overview"
href = "/product/overview/"

[[site.nav.children]]
title = "Cross-platform apps"
href = "/product/cross-platform-apps/"

[[site.nav.children]]
title = "Static sites"
href = "/product/static-sites/"

[[site.nav.children]]
title = "Server-rendered sites"
href = "/product/server-rendered-sites/"

[[site.nav.children]]
title = "Terminal apps"
href = "/product/terminal-apps/"

[[site.nav.children]]
title = "Charts"
href = "/product/charts/"

[[site.nav.children]]
title = "Production lifecycle"
href = "/product/production-lifecycle/"

[[site.nav.children]]
title = "Developer tools"
href = "/product/developer-tools/"

[[site.nav.children]]
title = "Design systems"
href = "/product/design-systems/"

[[site.nav.children]]
title = "Blog"
href = "/blog/"

[[site.nav]]
title = "Setup"
href = "/docs/learn/quickstart/"

[[site.nav]]
title = "Learn"
href = "/docs/learn/overview/"

[[site.nav]]
title = "Build"
href = "/docs/build-and-package/overview/"

[[site.nav]]
title = "Test"
href = "/docs/test-and-debug/overview/"

[[site.nav]]
title = "Publish"
href = "/docs/release-and-distribute/overview/"

[[site.routes]]
kind = "content"
path = "/docs"
source = "content/docs"
template = "fission::site::documentation"
sidebar = "site/docs-sidebar.toml"

[[site.routes]]
kind = "content"
path = "/reference"
source = "content/reference"
template = "fission::site::documentation"
sidebar = "site/reference-sidebar.toml"

[[site.routes]]
kind = "content"
path = "/blog"
source = "content/blog"
template = "fission::site::documentation"
sidebar = "site/blog-sidebar.toml"
