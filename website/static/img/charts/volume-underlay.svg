<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-labelledby="title-volume_underlay">
  <title id="title-volume_underlay">Price with volume chart preview</title>
  <defs>
    <linearGradient id="bg-volume_underlay" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f8"/>
    </linearGradient>
    <linearGradient id="accent-volume_underlay" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.52" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow-volume_underlay" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="640" height="420" rx="30" fill="url(#bg-volume_underlay)"/>
  <rect x="34" y="28" width="572" height="348" rx="26" fill="#ffffff" filter="url(#shadow-volume_underlay)"/>
  <text x="58" y="68" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="720" fill="#0f172a">Price with volume</text>
  <text x="58" y="94" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#64748b">Statistical and finance</text>
  <g transform="translate(58 112)">
    <rect x="164" y="54" width="156" height="156" fill="#2563eb" opacity=".12" stroke="#2563eb"/><rect x="198" y="28" width="156" height="156" fill="#14b8a6" opacity=".12" stroke="#14b8a6"/><line x1="164" y1="54" x2="198" y2="28" stroke="#94a3b8"/><line x1="320" y1="54" x2="354" y2="28" stroke="#94a3b8"/><line x1="320" y1="210" x2="354" y2="184" stroke="#94a3b8"/>
  </g>
</svg>
