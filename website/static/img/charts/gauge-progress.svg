<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-labelledby="title-gauge_progress">
  <title id="title-gauge_progress">Progress gauge chart preview</title>
