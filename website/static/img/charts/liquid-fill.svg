<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-labelledby="title-liquid_fill">
  <title id="title-liquid_fill">Liquid fill chart preview</title>
  <defs>
    <linearGradient id="bg-liquid_fill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f8"/>
    </linearGradient>
    <linearGradient id="accent-liquid_fill" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.52" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow-liquid_fill" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="640" height="420" rx="30" fill="url(#bg-liquid_fill)"/>
  <rect x="34" y="28" width="572" height="348" rx="26" fill="#ffffff" filter="url(#shadow-liquid_fill)"/>
  <text x="58" y="68" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="720" fill="#0f172a">Liquid fill</text>
  <text x="58" y="94" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#64748b">Radial and polar</text>
  <g transform="translate(58 112)">
    <circle cx="250" cy="124" r="92" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/><clipPath id="clip-liquid_fill"><circle cx="250" cy="124" r="88"/></clipPath><g clip-path="url(#clip-liquid_fill)"><rect x="156" y="130" width="188" height="90" fill="#2563eb" opacity=".78"/><path d="M 156 132 C 190 108 218 154 252 130 C 288 106 320 150 344 126 L 344 220 L 156 220 Z" fill="#14b8a6" opacity=".62"/></g><text x="250" y="134" text-anchor="middle" font-size="30" font-weight="800" fill="#0f172a">64%</text>
  </g>
</svg>
