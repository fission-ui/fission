<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-labelledby="title-mesh_render">
  <title id="title-mesh_render">Mesh render chart preview</title>
  <defs>
    <linearGradient id="bg-mesh_render" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f8"/>
    </linearGradient>
    <linearGradient id="accent-mesh_render" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.52" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow-mesh_render" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="640" height="420" rx="30" fill="url(#bg-mesh_render)"/>
  <rect x="34" y="28" width="572" height="348" rx="26" fill="#ffffff" filter="url(#shadow-mesh_render)"/>
  <text x="58" y="68" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="720" fill="#0f172a">Mesh render</text>
  <text x="58" y="94" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#64748b">3D and GL</text>
  <g transform="translate(58 112)">
    <polygon points="96,184 178,54 286,120 376,42 444,188" fill="#bfdbfe" stroke="#2563eb" stroke-width="3"/><path d="M178 54 L286 120 L96 184 M286 120 L444 188 M286 120 L376 42" fill="none" stroke="#fff" stroke-width="2"/>
  </g>
</svg>
